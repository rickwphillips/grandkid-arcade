name: CI

on:
  push:
    branches-ignore:
      - 'gh-readonly-queue/**'
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Opt into Node 24 for bundled JavaScript actions ahead of the
  # June 2 2026 Node 20 deprecation on GitHub-hosted runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint (informational, does not block)
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Test
        run: npm test -- --run

  php-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP syntax check + <?php tag guard
        # Two checks, because they catch different failure modes:
        #  1. php -l catches genuine syntax errors.
        #  2. The <?php start-tag guard catches base64/no-tag corruption, which
        #     php -l treats as valid literal-text output. This is exactly how the
        #     corrupted PR #8 word-search-themes.php would have passed a lint-only check.
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            if ! php -l "$f"; then fail=1; fi
            if [ "$(head -c 5 "$f")" != "<?php" ]; then
              echo "ERROR: $f does not start with <?php (possible corruption)"
              fail=1
            fi
          done < <(find app/php-api -name '*.php' -print0)
          exit $fail
